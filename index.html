<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>메인 홈페이지</title>
<style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #000000;
        }

        /* 3x3 그리드 레이아웃 설정 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* 카드 기본 스타일 (클릭 가능하도록 a 태그로 구현) */
        .card {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none; /* 링크 밑줄 제거 */
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            transition: all 0.25s ease-in-out; /* 부드러운 전환 효과 */
        }

        /* 타이틀 스타일 */
        .card h2 {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 8px 0;
            line-height: 1.4;
        }

        /* '클릭하세요~' 텍스트 스타일 */
        .card p {
            font-size: 14px;
            color: #666666;
            margin: 0;
        }

        /* ★ 마우스 포인트가 올라갔을 때(Hover) 효과 ★ */
        .card:hover {
            background-color: #f8f9fa; /* 연한 회색 배경 */
            border-color: #a0a0a0;     /* 테두리 진하게 */
            transform: translateY(-4px); /* 살짝 위로 떠오르는 효과 */
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); /* 그림자 강조 */
        }
    </style>
</head>
<body>
<h1>1-1반 실습</h1>

    <div class="grid-container">
        <a href="https://vr.yuhan.ac.kr/index.do" class="card" target="_blank">

            <p>클릭하세요~</p>
        </a>

            <h2>티몬 홈페이지</h2>

        <a href="https://www.tmon.co.kr/" class="card" target="_blank">

            <h2>티몬 홈페이지</h2>

</html>
